<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Login Sekolah</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-emerald-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl border border-emerald-100">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-600 text-white rounded-2xl mx-auto flex items-center justify-center text-2xl font-bold shadow-md mb-3">
                🏫
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Sistem Informasi Sekolah</h2>
            <p class="text-gray-500 text-sm mt-1">Silakan login untuk mengakses dashboard Anda</p>
        </div>

        <form action="#" method="POST" class="space-y-5">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Username / NIP / NISN</label>
                <input type="text" name="username" required placeholder="Masukkan username Anda" 
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Kata Sandi</label>
                <input type="password" name="password" required placeholder="••••••••" 
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Masuk Sebagai</label>
                <select name="role" required 
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 bg-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition cursor-pointer">
                    <option value="" disabled selected>-- Pilih Peran Anda --</option>
                    <option value="guru">👨‍🏫 Guru / Staf Pengajar</option>
                    <option value="wali_murid">👨‍👩‍👦 Wali Murid / Orang Tua</option>
                    <option value="admin">💻 Admin Sekolah (TU)</option>
                </select>
            </div>

            <button type="submit" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-md hover:shadow-lg active:scale-[0.98]">
                Masuk ke Sistem
            </button>

            <div class="text-center mt-4">
                <a href="index.html" class="text-sm text-emerald-600 hover:underline">← Kembali ke Halaman Utama</a>
            </div>
        </form>

    </div>

</body>
</html>
